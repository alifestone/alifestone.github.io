name: Deploy to GitHub Pages

on:
  # 推送到 main 時自動部署
  push:
    branches: [main]
  # 也允許在 Actions 頁面手動觸發
  workflow_dispatch:

# 給 GITHUB_TOKEN 部署 Pages 所需權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時只跑一個部署，取消進行中的舊部署（但讓進行中的部署跑完）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Astro site
        uses: withastro/action@v3
        # 預設：node 版本自動偵測、package manager 自動偵測、path 為 repo 根目錄

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
